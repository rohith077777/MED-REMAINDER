<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedRemind</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body class="bg-gradient-to-br from-green-100 to-blue-100 min-h-screen flex items-center justify-center">

<div class="app shadow-xl">

<!-- LOGIN -->
<div id="loginScreen" class="screen active text-center">
  <h1 class="text-3xl font-extrabold mb-4">💊 MedRemind</h1>
  <p class="text-gray-500 mb-4">Stay on track with your medicines</p>

  <input id="username" placeholder="Enter your name" class="input">
  <button onclick="login()" class="btn">Continue</button>
</div>

<!-- MAIN -->
<div id="mainScreen" class="screen">

  <div class="header">
    <h2 id="welcomeText"></h2>
    <button onclick="logout()" class="logout-btn">Logout</button>
  </div>

  <!-- ADD -->
  <div class="add-box">
    <input id="medName" placeholder="Medicine Name" class="input">
    <input id="medTime" type="time" class="input">
    <button onclick="addMedicine()" class="btn">Add Medicine</button>
  </div>

  <!-- LIST -->
  <div id="medList" class="space-y-3"></div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
